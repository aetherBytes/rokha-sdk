name: Release ro (rokha-cli)

# Tag-driven release of the `ro` CLI binary.
# Trigger:    git tag cli-v0.2.0 && git push --tags
# Artifacts:  ro-<version>-<target>.tar.gz uploaded to a GitHub Release.
#
# The brew formula and install.sh consume these assets. If this workflow
# runs in a private repo, the release page is private — mirror to the
# public SDK repo (aetherBytes/rokha-sdk) before shipping.

on:
  push:
    tags:
      - 'cli-v*'   # binary + crates.io + Homebrew release
      - 'sdk-v*'   # npm + PyPI publish
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. cli-v0.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    # Binaries only build for a cli-v* tag (or a manual run). An sdk-v* tag
    # skips straight to the npm/PyPI publish jobs.
    if: startsWith(github.ref, 'refs/tags/cli-v') || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-14   # was macos-13 — GH-hosted macos-13 no longer allocates (deprecated early 2026). Apple Silicon cross-compiles to x86_64 via rustup target.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            svc/rokha-cli/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('svc/rokha-cli/Cargo.lock') }}

      - name: Install OpenSSL (linux only — for reqwest native-tls)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Build
        working-directory: svc/rokha-cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          version="${tag#cli-v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Package tarball
        shell: bash
        run: |
          set -euo pipefail
          name="ro-${{ steps.ver.outputs.version }}-${{ matrix.target }}"
          mkdir -p "dist/$name"
          cp "svc/rokha-cli/target/${{ matrix.target }}/release/ro" "dist/$name/ro"
          cp svc/rokha-cli/PLAN.md "dist/$name/README.md" 2>/dev/null || true
          tar -czf "dist/$name.tar.gz" -C dist "$name"
          (cd dist && shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256")

      - uses: actions/upload-artifact@v4
        with:
          name: ro-${{ matrix.target }}
          path: dist/ro-*.tar.gz*
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/cli-v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#cli-v}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        shell: bash
        run: |
          {
            echo "# ro ${{ steps.ver.outputs.tag }}"
            echo
            echo "Rokha CLI binary release."
            echo
            echo "## Install"
            echo
            echo '```bash'
            echo "# macOS (Homebrew)"
            echo "brew install aetherBytes/tap/rokha"
            echo
            echo "# Linux"
            echo "curl -fsSL https://raw.githubusercontent.com/aetherBytes/rokha-sdk/main/scripts/install.sh | sh"
            echo
            echo "# Any platform with Cargo"
            echo "cargo install rokha-cli"
            echo '```'
            echo
            echo "## Artifacts"
            echo
            for f in dist/ro-*.tar.gz; do
              base=$(basename "$f")
              echo "- \`$base\`"
            done
          } > release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body_path: release-notes.md
          files: |
            dist/ro-*.tar.gz
            dist/ro-*.tar.gz.sha256
          draft: false
          prerelease: false

  # ── crates.io: publish the `ro` CLI. Runs on a cli-v* tag; no-ops without
  #    CARGO_REGISTRY_TOKEN so the release still succeeds pre-distribution.
  publish-crates:
    name: publish crates.io (rokha-cli)
    needs: release
    if: startsWith(github.ref, 'refs/tags/cli-v')
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Guard — token present?
        id: guard
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN unset — skipping crates.io publish." && echo "go=false" >> "$GITHUB_OUTPUT"
          else
            echo "go=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: dtolnay/rust-toolchain@stable
        if: steps.guard.outputs.go == 'true'
      - name: cargo publish
        if: steps.guard.outputs.go == 'true'
        working-directory: svc/rokha-cli
        run: cargo publish --allow-dirty

  # ── Homebrew: regenerate the tap formula with the freshly-released shas and
  #    push it to aetherBytes/homebrew-tap. Fixes the version/sha drift by
  #    generating the formula from the actual release instead of hand-editing.
  publish-homebrew:
    name: update Homebrew tap
    needs: release
    if: startsWith(github.ref, 'refs/tags/cli-v')
    runs-on: ubuntu-latest
    env:
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      VERSION: ${{ needs.release.outputs.version }}
    steps:
      - name: Guard — token present?
        id: guard
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN unset — skipping tap update." && echo "go=false" >> "$GITHUB_OUTPUT"
          else
            echo "go=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Fetch release shas + render formula
        if: steps.guard.outputs.go == 'true'
        run: |
          set -euo pipefail
          base="https://github.com/aetherBytes/rokha-sdk/releases/download/cli-v${VERSION}"
          sha() { curl -fsSL "$base/ro-${VERSION}-$1.tar.gz.sha256" | awk '{print $1}'; }
          A_MAC=$(sha aarch64-apple-darwin);      X_MAC=$(sha x86_64-apple-darwin)
          A_LNX=$(sha aarch64-unknown-linux-gnu); X_LNX=$(sha x86_64-unknown-linux-gnu)
          mkdir -p out
          cat > out/rokha.rb <<EOF
          # Generated by cli-release.yml — do not hand-edit.
          class Rokha < Formula
            desc "Rokha CLI — the local terminal agent for rokha.ai"
            homepage "https://rokha.ai"
            version "${VERSION}"
            on_macos do
              on_arm do
                url "${base}/ro-${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${A_MAC}"
              end
              on_intel do
                url "${base}/ro-${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "${X_MAC}"
              end
            end
            on_linux do
              on_arm do
                url "${base}/ro-${VERSION}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${A_LNX}"
              end
              on_intel do
                url "${base}/ro-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${X_LNX}"
              end
            end
            def install
              bin.install "ro"
            end
            test do
              assert_match(/ro #{version}/, shell_output("#{bin}/ro version"))
            end
          end
          EOF
      - name: Push formula to tap
        if: steps.guard.outputs.go == 'true'
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/aetherBytes/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp out/rokha.rb tap/Formula/rokha.rb
          cd tap
          git config user.name "rokha-release-bot"
          git config user.email "release@rokha.ai"
          git add Formula/rokha.rb
          git commit -m "rokha ${VERSION}" || { echo "no change"; exit 0; }
          git push

  # ── npx: publish the CLI wrapper @rokha/cli so `npx @rokha/cli` works. Runs on
  #    a cli-v* tag AFTER the release (its postinstall fetches those binaries).
  #    Pins the wrapper version to the tag so it always fetches the matching
  #    binaries (kills the version-drift class). no-ops without NPM_TOKEN.
  publish-npm-cli:
    name: publish npm (@rokha/cli)
    needs: release
    if: startsWith(github.ref, 'refs/tags/cli-v')
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      # Guard on the RAW secret, not NODE_AUTH_TOKEN: actions/setup-node with a
      # registry-url injects a placeholder NODE_AUTH_TOKEN (XXXXX-XXXXX-…) into
      # later steps, so an emptiness check on it passes even with no secret set
      # and the publish then hard-fails E404 instead of no-opping.
      - name: Guard — token present?
        id: guard
        env:
          RAW_NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$RAW_NPM_TOKEN" ]; then
            echo "NPM_TOKEN unset — skipping @rokha/cli publish." && echo "go=false" >> "$GITHUB_OUTPUT"
          else
            echo "go=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Pin wrapper version to the tag
        if: steps.guard.outputs.go == 'true'
        working-directory: svc/rokha-cli
        run: |
          version="${GITHUB_REF#refs/tags/cli-v}"
          npm version "$version" --no-git-tag-version --allow-same-version
      - name: publish
        if: steps.guard.outputs.go == 'true'
        working-directory: svc/rokha-cli
        run: npm publish --access public

  # ── npm + PyPI: publish the SDK packages. Runs on an sdk-v* tag; each no-ops
  #    without its token.
  publish-npm:
    name: publish npm (@rokha/sdk)
    if: startsWith(github.ref, 'refs/tags/sdk-v')
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      # Guard on the RAW secret, not NODE_AUTH_TOKEN: actions/setup-node with a
      # registry-url injects a placeholder NODE_AUTH_TOKEN (XXXXX-XXXXX-…) into
      # later steps, so an emptiness check on it passes even with no secret set
      # and the publish then hard-fails E404 instead of no-opping.
      - name: Guard — token present?
        id: guard
        env:
          RAW_NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$RAW_NPM_TOKEN" ]; then
            echo "NPM_TOKEN unset — skipping npm publish." && echo "go=false" >> "$GITHUB_OUTPUT"
          else
            echo "go=true" >> "$GITHUB_OUTPUT"
          fi
      - name: build + publish
        if: steps.guard.outputs.go == 'true'
        working-directory: sdk/typescript
        run: |
          npm ci
          npm run build
          npm publish --access public

  publish-pypi:
    name: publish PyPI (rokha-sdk)
    if: startsWith(github.ref, 'refs/tags/sdk-v')
    runs-on: ubuntu-latest
    env:
      TWINE_USERNAME: __token__
      TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Guard — token present?
        id: guard
        run: |
          if [ -z "$TWINE_PASSWORD" ]; then
            echo "PYPI_TOKEN unset — skipping PyPI publish." && echo "go=false" >> "$GITHUB_OUTPUT"
          else
            echo "go=true" >> "$GITHUB_OUTPUT"
          fi
      - name: build + upload
        if: steps.guard.outputs.go == 'true'
        working-directory: sdk/python
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine upload dist/*
