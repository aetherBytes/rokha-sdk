name: Release ro (rokha-cli)

# Tag-driven release of the `ro` CLI binary.
# Trigger:    git tag cli-v0.2.0 && git push --tags
# Artifacts:  ro-<version>-<target>.tar.gz uploaded to a GitHub Release.
#
# The brew formula and install.sh consume these assets. If this workflow
# runs in a private repo, the release page is private — mirror to the
# public SDK repo (aetherBytes/rokha-sdk) before shipping.

on:
  push:
    tags:
      - 'cli-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. cli-v0.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            svc/rokha-cli/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('svc/rokha-cli/Cargo.lock') }}

      - name: Install OpenSSL (linux only — for reqwest native-tls)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Build
        working-directory: svc/rokha-cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          version="${tag#cli-v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Package tarball
        shell: bash
        run: |
          set -euo pipefail
          name="ro-${{ steps.ver.outputs.version }}-${{ matrix.target }}"
          mkdir -p "dist/$name"
          cp "svc/rokha-cli/target/${{ matrix.target }}/release/ro" "dist/$name/ro"
          cp svc/rokha-cli/PLAN.md "dist/$name/README.md" 2>/dev/null || true
          tar -czf "dist/$name.tar.gz" -C dist "$name"
          (cd dist && shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256")

      - uses: actions/upload-artifact@v4
        with:
          name: ro-${{ matrix.target }}
          path: dist/ro-*.tar.gz*
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        shell: bash
        run: |
          {
            echo "# ro ${{ steps.ver.outputs.tag }}"
            echo
            echo "Rokha CLI binary release."
            echo
            echo "## Install"
            echo
            echo '```bash'
            echo "# macOS (Homebrew)"
            echo "brew install aetherBytes/tap/rokha"
            echo
            echo "# Linux"
            echo "curl -fsSL https://raw.githubusercontent.com/aetherBytes/rokha-sdk/main/scripts/install.sh | sh"
            echo
            echo "# Any platform with Cargo"
            echo "cargo install rokha-cli"
            echo '```'
            echo
            echo "## Artifacts"
            echo
            for f in dist/ro-*.tar.gz; do
              base=$(basename "$f")
              echo "- \`$base\`"
            done
          } > release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body_path: release-notes.md
          files: |
            dist/ro-*.tar.gz
            dist/ro-*.tar.gz.sha256
          draft: false
          prerelease: false
