  /api/marketplace/registry/publish:
    post:
      tags: [marketplace]
      summary: Publish one of your creations as a registry listing (JWT)
      description: |
        Logged-in users publish a creation (an authored skill, a harness, or a
        rig) into the registry as a `provider='rokha'` listing â€” it surfaces in
        normal registry search immediately. Re-publishing the same `name`
        updates the listing; a name already published by another user is
        rejected (409). Payloads carrying secret material (keys/tokens) are
        rejected. The listing's public `author` is your display identity â€”
        never a wallet or internal id.
      operationId: publishRegistryListing
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, listing_type, description]
              properties:
                name: { type: string, description: 'Listing slug (kebab-case, â‰¤64) â€” the external_id' }
                listing_type: { type: string, enum: [skill, server, rig], description: 'skill = an authored SKILL.md; server = a harness; rig = a rig' }
                description: { type: string, maxLength: 4000 }
                title: { type: string }
                tags: { type: array, items: { type: string }, maxItems: 12 }
                version: { type: string, default: 0.1.0 }
                homepage: { type: string }
                metadata: { type: object, description: 'The artifact rides here â€” e.g. {skill_md} / {harness: <config>} / {rig: <content>} (â‰¤200KB)' }
      responses:
        '200': { description: Published â€” live in registry search }
        '400': { description: Invalid name/type/description, or secret material detected }
        '409': { description: Name already published by another user }

  /api/marketplace/registry/publish/{external_id}:
    delete:
      tags: [marketplace]
      summary: Unpublish one of your listings (JWT, owner-checked)
      operationId: unpublishRegistryListing
      security:
