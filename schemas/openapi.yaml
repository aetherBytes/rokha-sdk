      responses:
        '200': { description: Rig }
    put:
      tags: [rigs]
      summary: Update a rig
      operationId: updateRig
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        '200': { description: Updated rig }

  /api/rigs/{id}/harnesses:
    get:
      tags: [rigs]
      summary: List a rig's harness memberships (position + role)
      operationId: listRigHarnesses
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Memberships }
    post:
      tags: [rigs]
      summary: Add a harness to a rig
      operationId: addRigHarness
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                harness_id: { type: string }
                position: { type: integer }
                role: { type: string }
      responses:
        '200': { description: Membership created }

  /api/traces:
    get:
      tags: [rigs]
      summary: List the caller's run traces (newest first)
      operationId: listTraces
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 50 } }
        - { name: offset, in: query, schema: { type: integer, default: 0 } }
      responses:
        '200':
          description: "Traces: { success, data, total, limit, offset }"
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
    post:
      tags: [rigs]
      summary: Record a trace (one harness/rig Ă— a result)
      operationId: createTrace
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                harness_id: { type: string }
                rig_id: { type: string }
                trace_kind: { type: string, enum: [atomic, run] }
                input: { type: object, additionalProperties: true }
                result: {}
                status: { type: string, enum: [success, error, partial, running] }
                metadata: { type: object, additionalProperties: true }
      responses:
        '200': { description: Created trace }

  /api/traces/{id}:
    get:
      tags: [rigs]
      summary: Get a trace
      operationId: getTrace
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Trace }

  /api/anon/rigs:
    get:
      tags: [rigs]
      summary: Pre-login Working Rig surface (anon mirror)
      description: |
        The pre-login mirror of the rigs/harnesses/traces surface. All verbs
        and subpaths of `/api/rigs`, `/api/harnesses`, and `/api/traces` are
        available under `/api/anon/...`, scoped to an ephemeral visitor
        identity supplied in the `x-anon-session-id` header (no JWT). A fresh
        id is a fresh slate; abandoned anon data expires after ~24h.
      operationId: anonRigs
      parameters:
        - name: x-anon-session-id
          in: header
          required: true
          schema: { type: string }
      responses:
        '200': { description: Rigs for this anon session }

  # ============================================================
  # Agent choreographies (SSE)
  # ============================================================

  /api/agents/rokha-agent/remix/stream/public:
    post:
      tags: [agents]
      summary: "Remix (SSE): the agent builds a rig from a random skill, live"
      description: |
        Server-Sent Events choreography â€” the agent discovers a random
        registry skill, targets it as the Working Rig's harness, fills the
        build config, and hands off to a run. Events: `content`,
        `tool_start`, `tool_result`, `ui_directive`, `done`. Anon-scoped via
        request `user_context.anon_session_id`.
      operationId: remixStream
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                message: { type: string }
                user_context: { type: object, additionalProperties: true }
      responses:
        '200':
          description: SSE stream (text/event-stream)
          content:
            text/event-stream:
              schema: { type: string }

  /api/agents/rokha-agent/run/stream:
    post:
      tags: [agents]
      summary: "Run (SSE, authenticated): execute the caller's saved Rig"
      description: |
        The authenticated twin of the public run stream â€” scoped to the
        caller's real identity (bearer JWT). Multi-harness Rigs run as a
        threaded flow: a parent `run` trace plus per-step `atomic` traces,
        each step's output feeding the next.
      operationId: runStreamAuthed
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                message: { type: string }
                user_context: { type: object, additionalProperties: true }
      responses:
        '200':
          description: SSE stream (text/event-stream)
          content:
            text/event-stream:
              schema: { type: string }

  /api/agents/rokha-agent/run/stream/public:
    post:
      tags: [agents]
      summary: "Run (SSE): the agent executes the saved Working Rig's harness"
      description: |
        Server-Sent Events choreography â€” the agent reads the caller's SAVED
        Working Rig and executes its harness: a live MCP `tools/call` when an
        endpoint + tool are configured, a `tools/list` probe when only an
        endpoint is set, or an agentic run (the agent performs the skill from
        its description + instruction + params) when neither â€” then writes an
        atomic trace. Events: `content`, `tool_start`, `tool_result`,
        `ui_directive`, `run_result` ({status, latency_ms, trace_id}),
        `done`. Anon-scoped via `user_context.anon_session_id`.
      operationId: runStream
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                message: { type: string }
                user_context: { type: object, additionalProperties: true }
      responses:
        '200':
          description: SSE stream (text/event-stream)
          content:
            text/event-stream:
              schema: { type: string }

# ================================================================
# Components
# ================================================================

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT issued by `/api/auth/email/login`, `/api/auth/google/callback`,
        `/api/wallets/verify`, or `/api/auth/token`. Send as
        `Authorization: Bearer <token>`. Refresh via `/api/auth/refresh`
        before expiry (24h default).

  parameters:
    SkillName:
      name: name
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 64
        pattern: ^[a-z0-9]([a-z0-9]|-(?!-))*[a-z0-9]$|^[a-z0-9]$

  responses:
    BadRequest:
      description: Invalid input
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: Missing or invalid auth
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  schemas:
    # --- Meta ---

    HealthResponse:
      type: object
      additionalProperties: true
      properties:
        status: { type: string, example: healthy }
        version: { type: string }
        uptime: { type: integer }
      required: [status]

    SchemaVersion:
      type: object
      properties:
        version: { type: string, example: "1.1.0" }
        title: { type: string }
        openapi: { type: string, example: "3.1.0" }
      required: [version]

    ErrorResponse:
      type: object
      properties:
        error: { type: string, description: 'Machine-readable error code' }
        message: { type: string }
        code: { type: string }
        name: { type: string }
      required: [error]

    # --- Skills ---

    SkillFrontmatterMetadata:
      type: object
      additionalProperties: { type: string }

    SkillInstallHint:
      type: object
      additionalProperties: { type: string }

    SkillSummary:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
          pattern: ^[a-z0-9]([a-z0-9]|-(?!-))*[a-z0-9]$|^[a-z0-9]$
        description: { type: string, minLength: 1, maxLength: 1024 }
        license: { type: string, nullable: true }
        compatibility: { type: string, maxLength: 500, nullable: true }
        metadata: { $ref: '#/components/schemas/SkillFrontmatterMetadata', nullable: true }
        skill_md_url: { type: string }
        install_hint: { $ref: '#/components/schemas/SkillInstallHint' }
      required: [name, description, skill_md_url, install_hint]

    SkillManifest:
      allOf:
        - $ref: '#/components/schemas/SkillSummary'
        - type: object
          properties:
            files:
              type: array
              items: { type: string }
            body_chars: { type: integer, minimum: 0 }
          required: [files, body_chars]

    SkillsListResponse:
      type: object
      properties:
        spec: { type: string, enum: ["agentskills.io"] }
        registry: { type: string }
        count: { type: integer, minimum: 0 }
        skills:
          type: array
          items: { $ref: '#/components/schemas/SkillSummary' }
      required: [spec, registry, count, skills]

    # --- Wallets ---

    WalletListResponse:
      type: object
      properties:
        solana:
          type: array
          items: { type: string }
        ethereum:
          type: array
          items: { type: string }
      additionalProperties: true

    WalletChallengeRequest:
      type: object
      properties:
        wallet_address: { type: string }
        wallet_type: { type: string, description: "phantom, metamask, etc." }
        chain: { type: string, enum: [solana, ethereum] }
      required: [wallet_address, wallet_type]

    WalletChallengeResponse:
      type: object
      properties:
        challenge: { type: string }
        expires_at: { type: string, format: date-time }
        nonce: { type: string }
      required: [challenge, expires_at]

    WalletVerifyRequest:
      type: object
      properties:
        wallet_address: { type: string }
        signature: { type: string }
        challenge: { type: string }
        wallet_type: { type: string }
        chain: { type: string, enum: [solana, ethereum] }
      required: [wallet_address, signature, challenge, wallet_type]

    WalletVerifyResponse:
      type: object
      properties:
        success: { type: boolean }
        token: { type: string, description: "JWT" }
        user_id: { type: string, format: uuid }
        tier: { type: string, enum: [free, casual, pro] }
        expires_at: { type: string, format: date-time }
      required: [success, token]

    # --- Auth ---

    EmailRegisterRequest:
      type: object
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
      required: [email, password]

    EmailLoginRequest:
      type: object
      properties:
        email: { type: string, format: email }
        password: { type: string }
      required: [email, password]

    EmailVerifyRequest:
      type: object
      properties:
        token: { type: string }
      required: [token]

    AuthSuccessResponse:
      type: object
      properties:
        success: { type: boolean }
        token: { type: string, description: "JWT â€” store in sessionStorage as nb_session" }
        user_id: { type: string, format: uuid }
        tier: { type: string, enum: [free, casual, pro] }
        expires_at: { type: string, format: date-time }
        email_verified: { type: boolean }
      required: [success, token]

    CliDeviceStartResponse:
      type: object
      properties:
        device_code:
          type: string
          description: 64-char hex. Never shown to the user. CLI uses this to poll.
        user_code:
          type: string
          description: 8 alphanumeric chars formatted `XXXX-XXXX` from a no-ambiguity alphabet.
          example: ABCD-1234
        verification_uri:
          type: string
          format: uri
          example: https://rokha.ai/cli
        verification_uri_complete:
          type: string
          format: uri
          description: Same as `verification_uri` but with `?code=user_code` so the user can skip the typing step.
          example: https://rokha.ai/cli?code=ABCD-1234
        expires_in:
          type: integer
          description: Seconds until the device_code expires.
          example: 600
        interval:
          type: integer
          description: Minimum seconds the CLI should wait between polls.
          example: 3
      required: [device_code, user_code, verification_uri, verification_uri_complete, expires_in, interval]

    CliDevicePollResponse:
      oneOf:
        - type: object
          properties:
            status: { type: string, enum: [pending] }
          required: [status]
        - type: object
          properties:
            status: { type: string, enum: [slow_down] }
            interval: { type: integer }
          required: [status, interval]
        - type: object
          properties:
            status: { type: string, enum: [authorized] }
            jwt: { type: string, description: 30-day CLI-scoped JWT }
            identity:
              type: object
              properties:
                user_id: { type: string }
                identity: { type: string }
                auth_method: { type: string }
                tier: { type: string, enum: [free, casual, pro] }
              required: [user_id, identity, auth_method, tier]
          required: [status, jwt, identity]
        - type: object
          properties:
            status: { type: string, enum: [expired] }
          required: [status]
        - type: object
          properties:
            status: { type: string, enum: [denied] }
          required: [status]
      discriminator:
        propertyName: status

    CliDeviceAuthorizeResponse:
      type: object
      properties:
        status: { type: string, enum: [ok] }
        device_summary:
          type: object
          properties:
            client: { type: string, nullable: true }
            created_at: { type: string, format: date-time }
          required: [created_at]
      required: [status, device_summary]

    # --- LLM proxy ---

    AnthropicMessagesRequest:
      type: object
      description: |
        Anthropic `/v1/messages` request, forwarded verbatim except
        `model` which is validated (must start with `claude-`) and
        defaulted to `claude-haiku-4-5-20251001`. `stream` is rejected
        in this slice (v0.3.2 adds it). Other fields are passed through
        unchanged.
      additionalProperties: true
      properties:
        model:
          type: string
          example: claude-haiku-4-5-20251001
        max_tokens:
          type: integer
          example: 1024
        system:
          oneOf:
            - { type: string }
            - { type: array, items: { type: object, additionalProperties: true } }
        messages:
          type: array
          items:
            type: object
            additionalProperties: true
            properties:
              role: { type: string, enum: [user, assistant] }
              content:
                oneOf:
                  - { type: string }
                  - { type: array, items: { type: object, additionalProperties: true } }
            required: [role, content]
        temperature:
          type: number
        tools:
          type: array
          items: { type: object, additionalProperties: true }
        stream:
          type: boolean
          default: false
          description: Must be false in v0.3.1. Streaming arrives in v0.3.2.
      required: [messages]

    AnthropicMessagesResponse:
      type: object
      description: Anthropic `/v1/messages` response shape, forwarded verbatim.
      additionalProperties: true
      properties:
        id: { type: string }
        type: { type: string, example: message }
        role: { type: string, example: assistant }
        model: { type: string }
        content:
          type: array
          items: { type: object, additionalProperties: true }
        stop_reason: { type: string, nullable: true }
        usage:
          type: object
          additionalProperties: true
          properties:
            input_tokens: { type: integer }
            output_tokens: { type: integer }

    # --- Agents ---

    AgentChatRequest:
      type: object
      properties:
        message: { type: string }
        user_context:
          type: object
          description: |
            Optional contextual hints. Common keys: `wallet_address`,
            `user_id`, `prelogin` (bool), `model_preference`.
          additionalProperties: true
      required: [message]

    AgentChatResponse:
      type: object
      properties:
        content: { type: string }
        model_used: { type: string }
        latency_ms: { type: number }
        confidence_score: { type: number }
        metadata:
          type: object
          additionalProperties: true
      required: [content]

    AgentStatus:
      type: object
      additionalProperties: true
      properties:
        name: { type: string }
        status: { type: string }
        model: { type: string }
        personality: { type: string }

    ModelInfo:
      type: object
      additionalProperties: true
      properties:
        id: { type: string }
        name: { type: string }
        provider: { type: string }
        context_length: { type: integer }

    # --- Harnesses ---

    HarnessType:
      type: string
      enum: [persona, preference, strategy, knowledge, compliance]

    SearchMode:
      type: string
      enum: [keyword, fuzzy, semantic]

    Harness:
      type: object
      properties:
        id: { type: string, format: uuid }
        wallet_address: { type: string }
        harness_type: { $ref: '#/components/schemas/HarnessType' }
        key: { type: string }
        content: { type: string, description: "Often a JSON-encoded string" }
        tags:
          type: array
          items: { type: string }
        metadata:
          type: object
          additionalProperties: true
          nullable: true
        is_public: { type: boolean }
        always_load:
          type: boolean
          description: >-
            Explicit always-load-vs-retrievable split: true = injected into
            agent context every turn; false (default) = retrievable by
            relevance (keyword/fuzzy/semantic search).
        version: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, wallet_address, harness_type, key, content]

    HarnessCreateRequest:
      type: object
      properties:
        wallet_address: { type: string, description: "Erebus overrides with caller's identity" }
        harness_type: { $ref: '#/components/schemas/HarnessType' }
        key: { type: string, description: "Unique within (wallet, harness_type)" }
        content: { type: string }
        tags:
          type: array
          items: { type: string }
        metadata:
          type: object
          additionalProperties: true
        is_public: { type: boolean, default: false }
        always_load:
          type: boolean
          default: false
          description: true = inject into agent context every turn; false = retrievable by relevance
      required: [harness_type, key, content]

    HarnessUpdateRequest:
      type: object
      properties:
        content: { type: string }
        tags:
          type: array
          items: { type: string }
        metadata:
          type: object
          additionalProperties: true
        is_public: { type: boolean }

    HarnessSearchRequest:
      type: object
      properties:
        wallet_address: { type: string }
        harness_type: { $ref: '#/components/schemas/HarnessType' }
        query: { type: string, description: "Required for fuzzy/semantic; optional for tag/type filter" }
        search_mode: { $ref: '#/components/schemas/SearchMode' }
        tags:
          type: array
          items: { type: string }
        limit: { type: integer, minimum: 1, maximum: 500, default: 50 }
        offset: { type: integer, minimum: 0, default: 0 }

    HarnessEnvelope:
      type: object
      description: Wrapper that Erebus puts around a single harness response
      properties:
        data: { $ref: '#/components/schemas/Harness' }
        success: { type: boolean }

    HarnessesListResponse:
      type: object
      description: Wrapper used for list + search responses
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Harness' }
        success: { type: boolean }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }
      required: [data]

    # --- MCP ---

    MCPTool:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        inputSchema:
          type: object
          additionalProperties: true
        annotations:
          type: object
          properties:
            readOnlyHint: { type: boolean }
            destructiveHint: { type: boolean }
            idempotentHint: { type: boolean }
            openWorldHint: { type: boolean }
      required: [name, description]

    MCPJsonRpcRequest:
      type: object
      properties:
        jsonrpc: { type: string, enum: ["2.0"] }
        id:
          oneOf:
            - { type: integer }
            - { type: string }
        method: { type: string, example: "tools/call" }
        params:
          type: object
          additionalProperties: true
      required: [jsonrpc, id, method]

    MCPJsonRpcResponse:
      type: object
      properties:
        jsonrpc: { type: string, enum: ["2.0"] }
        id:
          oneOf:
            - { type: integer }
            - { type: string }
        result:
          type: object
          description: Present on success
          additionalProperties: true
        error:
          type: object
          description: Present on failure
          properties:
            code: { type: integer }
            message: { type: string }
            data: { type: object, additionalProperties: true }
          required: [code, message]
      required: [jsonrpc, id]

    # --- Marketplace ---

    MarketplaceListing:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        listing_type: { type: string, enum: [tool, rig, agent, workflow, skill, server] }
        status: { type: string, enum: [pending, approved, rejected, featured] }
        metadata:
          type: object
          additionalProperties: true
        created_at: { type: string, format: date-time }
      required: [id, name, description]

    MarketplaceSearchRequest:
      type: object
      properties:
        query: { type: string }
        listing_type: { type: string }
        tags:
          type: array
          items: { type: string }
        limit: { type: integer, minimum: 1, maximum: 500 }
        offset: { type: integer, minimum: 0 }

    SkillMdBundle:
      type: object
      required: [ok, provider, slug, name, classification, body]
      properties:
        ok: { type: boolean }
        provider: { type: string }
        slug: { type: string }
        name: { type: string }
        description: { type: string }
        homepage: { type: string }
        classification:
          type: string
          enum: [prompt, scripted, mcp]
          description: prompt = a model can execute it faithfully; scripted/mcp = needs a runtime
        classification_basis: { type: string }
        requires_bins: { type: array, items: { type: string } }
        has_install_steps: { type: boolean }
        scripts_referenced: { type: array, items: { type: string } }
        frontmatter_metadata: { type: object, additionalProperties: true, nullable: true }
        body: { type: string }
        body_chars: { type: integer }
        truncated: { type: boolean }
        cached: { type: boolean }

    RegistryListing:
      type: object
      additionalProperties: true
      properties:
        name: { type: string }
        description: { type: string }
        version: { type: string, nullable: true }
        author: { type: string }
        homepage: { type: string, nullable: true }
        downloads: { type: integer }
        stars: { type: integer }
        tags:
          type: array
          items: { type: string }
        source: { type: string, enum: [clawhub, smithery, smithery_skills] }
        listing_type: { type: string, enum: [skill, server] }
        external_id: { type: string }
        provider_id: { type: string }
        external_updated_at: { type: string, format: date-time }
        metadata:
          type: object
          additionalProperties: true
      required: [name, description, source]

    RegistryListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/RegistryListing' }
        total_count: { type: integer }
        limit: { type: integer }
        offset: { type: integer }
      required: [items, total_count]
