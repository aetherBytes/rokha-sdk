                summary: { type: string }
                content: { type: object, additionalProperties: true }
      responses:
        '200': { description: Created rig }

  /api/rigs/{id}:
    get:
      tags: [rigs]
      summary: Get a rig
      operationId: getRig
      security: [{ bearerAuth: [] }]
      parameters:
