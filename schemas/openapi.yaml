openapi: 3.1.0
info:
  title: Rokha Public API
  description: |
    The public, agent-friendly surface of Rokha. Single source of truth
    for the contract between [rokha-sdk](https://github.com/aetherBytes/rokha-sdk)
    and the Erebus router.

    **Versioning rule (non-negotiable)**: every change to this file MUST bump
    `info.version` per semver:
      - **major** â€” removed endpoints, removed/renamed fields, type changes
      - **minor** â€” new endpoints, new optional fields
      - **patch** â€” documentation, examples, descriptions

    The live server's served schema MUST match the version of the deployed SDK
    they're meant to coexist with. Clients can verify via `GET /api/schema/version`.

    The full operational rule lives in the main repo's `CLAUDE.md` under
    "Public Surface Contract".
  version: 0.0.0-dev.1
  license:
    name: MIT
    url: https://github.com/aetherBytes/rokha-sdk/blob/main/LICENSE
  contact:
    name: Rokha
    url: https://rokha.ai

servers:
  - url: http://localhost:3000
    description: Local development (default Erebus port)
  - url: https://erebus.rokha.ai
    description: Production (hosted Erebus)

tags:
  - name: meta
    description: Server metadata â€” health, info, schema, friendly LLM index
  - name: skills
    description: First-party agentskills.io skills (CORS-open, no auth)
  - name: wallets
    description: Web3 wallet challenge/verify auth (Solana, Ethereum)
  - name: auth
    description: Email + Google OAuth + JWT issue/refresh
  - name: agents
    description: Rokha chat, models, tools, history (public + signed variants)
  - name: harnesses
    description: Wallet-scoped memory/context CRUD with search (JWT + wallet sig)
  - name: mcp
    description: Model Context Protocol â€” tool discovery and invocation
  - name: marketplace
    description: Rokha Registry listings + third-party tool registry (ClawHub, Smithery)
  - name: discovery
    description: Live discovery of running tools, agents, protocols
  - name: llm
    description: Federated LLM proxy â€” caller-keyed Anthropic forwarding
  - name: rigs
    description: Rigs (workflows of configured harnesses) + run traces â€” the Working Rig surface
  - name: analytics
    description: Privacy-safe product-analytics capture â€” anon-session-keyed, fire-and-forget

security: []  # default: no auth. Routes that need it set their own.

paths:
  # ============================================================
  # Meta
  # ============================================================

  /health:
    get:
      tags: [meta]
      summary: Liveness check
      operationId: getHealth
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/info:
    get:
      tags: [meta]
      summary: Full route map + auth flow reference
      description: |
        Human- and agent-readable enumeration of every public API surface,
        their auth requirements, and the sensitive-data flow. Always
        current â€” generated from the live Erebus router.
      operationId: getApiInfo
      responses:
        '200':
          description: Full info document
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /llms.txt:
    get:
      tags: [meta]
      summary: Friendly LLM-readable index
      operationId: getLlmsTxt
      responses:
        '200':
          description: Index document
          content:
            text/plain:
              schema:
                type: string

  /api/schema:
    get:
      tags: [meta]
      summary: This OpenAPI specification (live)
      operationId: getSchema
      responses:
        '200':
          description: OpenAPI YAML
          content:
            application/yaml:
              schema:
                type: string

  /api/schema/version:
    get:
      tags: [meta]
      summary: Schema version (just the semver string + metadata)
      operationId: getSchemaVersion
      responses:
        '200':
          description: Schema version info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchemaVersion'

  # ============================================================
  # Skills (agentskills.io)
  # ============================================================

  /api/skills:
    get:
      tags: [skills]
      summary: List first-party Rokha skills
      operationId: listSkills
      responses:
        '200':
          description: Skill index
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillsListResponse'

  /api/skills/{name}:
    get:
      tags: [skills]
      summary: Full manifest for one skill
      operationId: getSkill
      parameters:
        - $ref: '#/components/parameters/SkillName'
      responses:
        '200':
          description: Skill manifest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillManifest'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/skills/{name}/SKILL.md:
    get:
      tags: [skills]
      summary: Raw SKILL.md content
      operationId: getSkillMd
      parameters:
        - $ref: '#/components/parameters/SkillName'
      responses:
        '200':
          description: SKILL.md content
          content:
            text/markdown:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /api/skills/{name}/{path}:
    get:
      tags: [skills]
      summary: Bundled file from a skill folder
      operationId: getSkillFile
      parameters:
        - $ref: '#/components/parameters/SkillName'
        - name: path
          in: path
          required: true
          schema:
            type: string
            pattern: ^[A-Za-z0-9._/-]+$
            maxLength: 256
      responses:
        '200':
          description: File content
          content:
            text/markdown:
              schema: { type: string }
            text/x-shellscript:
              schema: { type: string }
            text/x-python:
              schema: { type: string }
            application/javascript:
              schema: { type: string }
            application/json:
              schema: { type: object }
            application/octet-stream:
              schema: { type: string, format: binary }
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Path escapes the skill root
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================
  # Wallets â€” Web3 challenge/verify auth
  # ============================================================

  /api/wallets:
    get:
      tags: [wallets]
      summary: List supported wallet types
      operationId: listSupportedWallets
      responses:
        '200':
          description: Supported wallet types per chain
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletListResponse'

  /api/wallets/detect:
    post:
      tags: [wallets]
      summary: Detect wallets installed in the user's browser
      description: |
        Reads the user-agent's wallet provider injections (window.ethereum,
        window.solana, etc.) â€” practically a hint for frontends; safe to
        skip for non-browser SDKs.
      operationId: detectWallets
      responses:
        '200':
          description: Detection result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/wallets/challenge:
    post:
      tags: [wallets]
      summary: Create a wallet signing challenge
      operationId: createWalletChallenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletChallengeRequest'
      responses:
        '200':
          description: Challenge created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletChallengeResponse'

  /api/wallets/verify:
    post:
      tags: [wallets]
      summary: Verify a signed challenge and issue a session
      operationId: verifyWalletSignature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletVerifyRequest'
      responses:
        '200':
          description: Verified â€” JWT + session info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletVerifyResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/wallets/status:
    get:
      tags: [wallets]
      summary: Wallet auth status for the current session
      operationId: getWalletStatus
      responses:
        '200':
          description: Status
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  # ============================================================
  # Auth â€” email + Google OAuth + JWT
  # ============================================================

  /api/auth/email/register:
    post:
      tags: [auth]
      summary: Register a new email account
      description: |
        Creates a user via email + password. Returns a JWT immediately
        (account is usable). A verification link is delivered out-of-band
        (emailed to the user); the verification token is never returned in
        the response body.
      operationId: emailRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailRegisterRequest'
      responses:
        '200':
          description: Registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'

  /api/auth/email/login:
    post:
      tags: [auth]
      summary: Log in with email + password
      operationId: emailLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailLoginRequest'
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          description: Too many failed attempts â€” account temporarily locked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/email/verify:
    post:
      tags: [auth]
      summary: Verify an email address
      operationId: emailVerify
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerifyRequest'
      responses:
        '200':
          description: Verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }

  /api/auth/email/resend-verification:
    post:
      tags: [auth]
      summary: Resend the email verification token
      operationId: emailResendVerification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
              required: [email]
      responses:
        '200':
          description: New verification sent (or silently no-op if already verified)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/auth/google/start:
    post:
      tags: [auth]
      summary: Begin Google OAuth flow
      description: Returns the URL the client should redirect to.
      operationId: googleAuthStart
      responses:
        '200':
          description: OAuth start URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  redirect_url: { type: string, format: uri }
                  state: { type: string }

  /api/auth/google/callback:
    get:
      tags: [auth]
      summary: Google OAuth callback
      operationId: googleAuthCallback
      parameters:
        - { name: code, in: query, required: true, schema: { type: string } }
        - { name: state, in: query, required: true, schema: { type: string } }
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'

  /api/auth/token:
    post:
      tags: [auth]
      summary: Issue a JWT for an existing identity
      operationId: authIssueToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'

  /api/auth/refresh:
    post:
      tags: [auth]
      summary: Refresh an expiring JWT
      operationId: authRefresh
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ============================================================
  # CLI device authorization (RFC 8628 adapted) â€” `ro login`.
  # See docs-internal/src/operations/cli-device-flow.md.
  # ============================================================

  /api/auth/cli/start:
    post:
      tags: [auth]
      summary: Start a CLI device-flow authorization
      description: |
        Anonymous. The CLI calls this to obtain a `device_code` (opaque,
        kept private) + `user_code` (short, shown to the user). The user
        completes the flow at `verification_uri` in a browser.
      operationId: cliAuthStart
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                scope:
                  type: string
                  default: cli
                client:
                  type: string
                  description: Self-reported client identifier (e.g. `ro/0.2.0`).
      responses:
        '200':
          description: Device flow initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CliDeviceStartResponse'

  /api/auth/cli/poll:
    post:
      tags: [auth]
      summary: Poll for device-flow authorization
      description: |
        Anonymous. The CLI polls every `interval` seconds with its
        `device_code`. Returns `pending`, `slow_down`, `authorized`
        (with JWT), `expired`, or `denied`.
      operationId: cliAuthPoll
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [device_code]
              properties:
                device_code:
                  type: string
      responses:
        '200':
          description: Poll outcome
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CliDevicePollResponse'
        '404':
          description: Unknown device_code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/cli/authorize:
    post:
      tags: [auth]
      summary: Authorize a CLI device by user_code
      description: |
        JWT-required. Called from the rokha.ai `/cli` page after the
        user has logged in. Binds the `user_code` to the caller's
        identity, mints a CLI-scoped 30-day JWT, and stores it for the
        CLI's next poll.
      operationId: cliAuthAuthorize
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_code]
              properties:
                user_code:
                  type: string
                  example: ABCD-1234
      responses:
        '200':
          description: Code bound to identity; CLI poll will now return JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CliDeviceAuthorizeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Unknown user_code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Code already authorized or denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '410':
          description: Code expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # LLM proxy â€” federated Anthropic forwarding via the user's
  # Rokha account (BYO key wins; tenant key + rate-limit fallback).
  # ============================================================

  /api/v1/llm/proxy:
    post:
      tags: [llm]
      summary: Forward an Anthropic /v1/messages request through Rokha
      description: |
        JWT-required. Forwards an Anthropic-shaped messages request to
        Anthropic using the caller's BYO key (if present in
        `agent_api_keys`) or the Rokha tenant key as a rate-limited
        fallback. Only `claude-*` models are accepted; default is
        `claude-haiku-4-5-20251001`. Streaming is rejected in this
        slice (v0.3.2 will add it).

        Body and response mirror Anthropic's `/v1/messages` shape
        verbatim, so existing Anthropic SDKs can be pointed at this
        URL with no other changes (set the base to
        `https://erebus.rokha.ai/api/v1/llm` and send a Rokha JWT
        instead of `x-api-key`).
      operationId: llmProxy
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnthropicMessagesRequest'
      responses:
        '200':
          description: Forwarded response from Anthropic
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnthropicMessagesResponse'
        '400':
          description: Bad request (e.g. unsupported model or stream=true)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          description: Tenant-key rate limit exceeded (free tier)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream Anthropic error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: No tenant key configured AND caller has no BYO key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # Agents â€” Rokha chat + models + tools
  # ============================================================

  /api/agents/health:
    get:
      tags: [agents]
      summary: Agent service health
      operationId: agentsHealth
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/agents/rokha-agent/chat:
    post:
      tags: [agents]
      summary: Chat with Rokha (authenticated)
      description: |
        Standard non-streaming chat. JWT is required for paid-tier features;
        without it, the request is treated as pre-login free-tier.
      operationId: agentChat
      security:
        - bearerAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentChatRequest'
      responses:
        '200':
          description: Chat response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentChatResponse'

  /api/agents/rokha-agent/chat/public:
    post:
      tags: [agents]
      summary: Chat with Rokha (no auth â€” pre-login)
      operationId: agentChatPublic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentChatRequest'
      responses:
        '200':
          description: Chat response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentChatResponse'

  /api/agents/rokha-agent/chat/stream:
    post:
      tags: [agents]
      summary: Streaming chat with Rokha (SSE)
      description: |
        Server-sent events. Event types: `content`, `thinking`, `tool_start`,
        `tool_result`, `done`. Current MVP buffers the full response and
        emits one `content` event followed by `done`; real per-token
        streaming is planned.
      operationId: agentChatStream
      security:
        - bearerAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentChatRequest'
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Lines alternate `event: <type>` and `data: <json>`,
                  with blank lines as event separators.

  /api/agents/rokha-agent/chat/stream/public:
    post:
      tags: [agents]
      summary: Streaming chat (no auth)
      operationId: agentChatStreamPublic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentChatRequest'
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema: { type: string }

  /api/agents/rokha-agent/status:
    get:
      tags: [agents]
      summary: Rokha agent status
      operationId: agentStatus
      responses:
        '200':
          description: Status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentStatus'

  /api/agents/rokha-agent/tools:
    get:
      tags: [agents]
      summary: Tools currently bound to Rokha
      operationId: agentTools
      responses:
        '200':
          description: Tool list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MCPTool'

  /api/agents/rokha-agent/history:
    get:
      tags: [agents]
      summary: Recent conversation history for Rokha
      operationId: agentHistory
      security:
        - bearerAuth: []
      responses:
        '200':
          description: History
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true

  /api/agents/rokha-agent/clear:
    post:
      tags: [agents]
      summary: Clear Rokha's conversation history for the caller
      operationId: agentClearHistory
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cleared

  /api/agents/rokha-agent/model-info:
    get:
      tags: [agents]
      summary: Rokha's current model
      operationId: agentModelInfo
      responses:
        '200':
          description: Model info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelInfo'

  /api/agents/rokha-agent/available-models:
    get:
      tags: [agents]
      summary: Models available to Rokha
      operationId: agentAvailableModels
      responses:
        '200':
          description: Model list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModelInfo'

  # ============================================================
  # Harnesses â€” wallet-scoped memory layer
  # ============================================================

  /api/harnesses/health:
    get:
      tags: [harnesses]
      summary: Harnesses service health
      operationId: harnessesHealth
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/harnesses:
    get:
      tags: [harnesses]
      summary: List harnesses (with optional filters via query string)
      operationId: listHarnesses
      security:
        - bearerAuth: []
      parameters:
        - { name: wallet_address, in: query, schema: { type: string } }
        - { name: harness_type, in: query, schema: { $ref: '#/components/schemas/HarnessType' } }
        - { name: tags, in: query, schema: { type: string }, description: 'Comma-separated' }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 500 } }
      responses:
        '200':
          description: Harness list (wrapped in `{data, ...}` envelope)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HarnessesListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [harnesses]
      summary: Create an harness
      operationId: createHarness
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HarnessCreateRequest'
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HarnessEnvelope'

  /api/harnesses/search:
    post:
      tags: [harnesses]
      summary: Search harnesses (keyword, fuzzy, or semantic)
      operationId: searchHarnesses
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HarnessSearchRequest'
      responses:
        '200':
          description: Results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HarnessesListResponse'

  /api/harnesses/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [harnesses]
      summary: Get one harness by ID
      operationId: getHarness
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Harness
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HarnessEnvelope' }
        '404':
