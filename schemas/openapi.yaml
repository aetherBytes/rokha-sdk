  # ============================================================
  # MCP â€” Model Context Protocol
  # ============================================================

  /mcp/health:
    get:
      tags: [mcp]
      summary: MCP protocol service health
      operationId: mcpHealth
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthResponse' }

  /mcp/tools:
    get:
      tags: [mcp]
      summary: List available MCP tools (convenience, non-JSON-RPC)
      operationId: mcpListToolsConvenience
      responses:
        '200':
          description: Tool list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/MCPTool' }

  /mcp/jsonrpc:
    post:
      tags: [mcp]
      summary: MCP JSON-RPC endpoint (full protocol)
      description: |
        Implements MCP 2025-11-25. Common methods:
          - `initialize` â€” protocol negotiation
          - `tools/list` â€” enumerate tools
          - `tools/call` â€” invoke a tool with arguments

        PUBLIC (no auth): the discovery handshake â€” `initialize`,
        `tools/list`, `resources/list`, `prompts/list`, `ping` â€” plus
        `tools/call` on the read-only registry tools `registry_search`
        (free-text search over the 30k-skill registry) and
        `registry_get_skill` (install-ready SKILL.md â€” agentskills.io
        frontmatter + body + classification + required binaries â€” so any
        agent can adopt a Registry skill directly), and the pure-compute
        authoring tool `skill_author` (build a standards-compliant SKILL.md
        from `name` + `description` + `instructions`, plus optional
        `compatibility` (runtime/environment requirements, â‰¤500 chars),
        `allowed_tools` (space-separated, scoped allowlist), `license`, and
        `metadata` (a stringâ†’string object); returns the assembled SKILL.md),
        and `harness_author` (pure-compute â€” configure a Harness: a skill or
        instruction wired to run, from `kind` + `instruction` + optional `tag`
        and a live MCP `endpoint`/`tool`/`params`; returns the config).
        Every other method/tool requires `Authorization: Bearer <JWT>`.

        Notable tool families (enumerate live via `tools/list`): harness /
        rig / trace CRUD (the Working-Rig surface), `skills_list` +
        `skills_read` â€” fetch the first-party skills catalog at
        `/api/skills`, including rig templates' `assets/rig.json` skeletons,
        so an agent can instantiate a workflow template entirely over MCP;
        `rig_swap_skill` â€” re-resolve one step of a rig against the live
        registry and re-point it, keeping the step's instruction; and
        `skill_author` â€” author a portable Agent Skill (SKILL.md) the same
        way the human Build-a-Skill builder does (two-front-door parity); and
        `harness_author` â€” configure a Harness (a skill/instruction wired to
        run) the same way the human Build-a-Harness builder does; and
        `skill_save` (JWT) â€” persist an authored skill to the signed-in
        user's creations (upsert by name; saving is a logged-in capability);
        and `registry_publish` (JWT) â€” publish a creation as a searchable
        registry listing (mirrors POST /api/marketplace/registry/publish).
      operationId: mcpJsonRpc
      security:
        - bearerAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MCPJsonRpcRequest' }
      responses:
        '200':
          description: JSON-RPC response (success or error in envelope)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MCPJsonRpcResponse' }

