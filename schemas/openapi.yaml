  /api/marketplace/registry/skill-md:
    get:
      tags: [marketplace]
      summary: Ingest a listing's real SKILL.md â€” fetched from its source registry, parsed and classified
      description: >-
        Returns the skill's actual SKILL.md (frontmatter + body) plus a derived
