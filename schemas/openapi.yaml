  # ============================================================
  # Analytics â€” privacy-safe capture (added 4.5.0)
  # ============================================================

  /api/analytics/session/start:
    post:
      tags: [analytics]
      summary: Begin (or refresh) an analytics session
      description: |
        Registers a browser session keyed by the client-minted anon session
        UUID (the same id the chat uses). Attribution is UUIDs only â€” never
        wallet addresses, tokens, or raw IPs. Idempotent per session id.
      operationId: analyticsSessionStart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id]
              properties:
                session_id: { type: string, format: uuid }
                referrer: { type: string, maxLength: 300 }
                utm: { type: object, additionalProperties: { type: string } }
      responses:
        '204': { description: Recorded }

  /api/analytics/session/end:
    post:
      tags: [analytics]
      summary: Mark an analytics session's last activity
      operationId: analyticsSessionEnd
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id]
              properties:
                session_id: { type: string, format: uuid }
      responses:
        '204': { description: Recorded }

  /api/analytics/events:
    post:
      tags: [analytics]
      summary: Ingest a batch of navigation/interaction events
      description: |
        Batched capture (max 50 events). Categories: `navigation`,
        `interaction`. Bounded payloads; events never carry PII.
      operationId: analyticsIngestEvents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id, events]
              properties:
                session_id: { type: string, format: uuid }
                events:
                  type: array
                  maxItems: 50
                  items:
                    type: object
                    required: [category, action]
                    properties:
                      category: { type: string, enum: [navigation, interaction] }
                      action: { type: string, maxLength: 64 }
                      surface: { type: string, maxLength: 128 }
                      metadata: { type: object }
      responses:
        '204': { description: Recorded }
        '400': { description: Invalid batch (size/category/length) }

  /api/discovery/recent:
    get:
      tags: [discovery]
      summary: Recent mesh activity (cross-registry events, newest first)
      description: |
        JSON read of the mesh activity pulse â€” listings synced/updated across
        connected registries, with provider, action, and counts. The
        agent-consumable mirror of the SSE pulse stream. No auth.
      operationId: discoverRecent
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Recent events
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /api/marketplace/mcp-proxy:
    post:
      tags: [mcp]
      summary: Stateless one-shot outbound MCP probe/call
      description: |
        Probe or invoke an arbitrary MCP endpoint without provisioning a
        persisted connection. Hard-guarded â€” method allowlist
        (`tools/list` | `tools/call`), SSRF protection (https only in prod,
        private/metadata IPs blocked), 15s timeout, 256KB response cap.
        `tools/list` is public; `tools/call` requires a bearer JWT.
      operationId: mcpProxy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [endpoint, method]
              properties:
                endpoint: { type: string, description: "Target MCP JSON-RPC endpoint URL" }
                method: { type: string, enum: ["tools/list", "tools/call"] }
                params:
                  type: object
                  additionalProperties: true
                  description: "For tools/call: { name, arguments }"
      responses:
        '200':
          description: "Flattened result: { ok, method, endpoint, tools? | result? }"
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        '401': { description: "tools/call without a valid token" }
        '400': { description: "Disallowed method or invalid/blocked endpoint" }

  # ============================================================
  # Rigs + Traces â€” the Working Rig surface
  # A Rig is a workflow of configured harnesses; a trace is the
  # record of a run (input in, result out). Authed surface is
  # owner-scoped via bearer JWT. The SAME surface is mirrored for
  # pre-login visitors under /api/anon/{rigs,harnesses,traces},
  # keyed by an `x-anon-session-id` header instead of a JWT.
  # ============================================================

  /api/rigs:
    get:
